appId: com.cyberbunny.desktop
productName: CyberBunny
directories:
  buildResources: build
  output: release
files:
  - dist
  - dist-electron
mac:
  icon: build/icon.icns
  artifactName: ${productName}-${version}-${arch}.${ext}
  target:
    - target: dmg
      arch:
        # - x64
        - arm64
    # - target: zip
    #   arch:
    #     - x64
    #     - arm64
win:
  icon: build/icon.ico
  artifactName: ${productName}-${version}-setup.${ext}
  target:
    - target: nsis
      arch:
        - x64
linux:
  icon: build/icon.png
  artifactName: ${productName}-${version}.${ext}
  target:
    - target: AppImage
      arch:
        - x64
    - target: deb
      arch:
        - x64
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
